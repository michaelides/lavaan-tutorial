name: render-site

on:
  push:
    branches: [main]
    paths:
      - 'tutorials/**'
      - 'index.qmd'
      - 'glossary.qmd'
      - 'notation.qmd'
      - 'cheatsheet.qmd'
      - 'data/**'
      - 'data/data-note.qmd'
      - 'images/**'
      - 'assets/**'
      - '_quarto.yml'
      - 'references.bib'
      - 'apa-7th-edition.csl'
      - 'renv.lock'
      - '.github/workflows/render-site.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  render:
    name: Render Quarto site and commit to docs/
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"
        env:
          QUARTO_NO_PYTHON: true

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Restore R package environment via renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
        env:
          RENV_CONFIG_REPOS_OVERRIDE: "https://packagemanager.posit.co/cran/latest"

      - name: Render Quarto website into docs/
        run: quarto render

      - name: Commit rendered output back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to docs/ — skipping commit."
          else
            git commit -m "Render site ($(git rev-parse --short HEAD))"
            git push
          fi
